<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7928ca" />
      <stop offset="100%" stop-color="#ff0080" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#030014" />
  
  <!-- Subtle border to mimic glassmorphism -->
  <rect x="2" y="2" width="508" height="508" rx="118" fill="transparent" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" />
  
  <!-- The L shape with glow -->
  <g transform="translate(156, 121)">
    <path d="M 20 0 L 80 0 L 80 210 L 180 210 L 180 270 L 20 270 Z" fill="url(#grad1)" />
    <!-- Small floating accent shape -->
    <circle cx="180" cy="50" r="24" fill="url(#grad2)" />
  </g>
</svg>
